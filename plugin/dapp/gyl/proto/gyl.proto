syntax = "proto3";
package types;

//预付款
message AdanceInfo{
    string adanceId             = 1;//预付款ID
    Enterprise coreCompany      = 2;//核心企业
    Enterprise downCompany      = 3;//下游企业
    int64  orderAmount          = 4;//订单总额
    int64  signDate             = 5;//签订日期
    int64  endDate              = 6;//承兑日期
    int64  goodsNums            = 7;//交货数量
    int64  goodsDate            = 8;//交货日期
    string goodsName            = 9;//商品名称
    ZsgjState state             = 10;
    OperationType opty          = 11;//
    int64  rate                 = 12;//利率
    Enterprise ownerCompany     = 13;//
}

//单据-
message ZsgjReceipt{
    int64       registerDate    = 1;//登记时间
    Enterprise  coreCompany     = 2;//核心企业
    Enterprise  receiveCompany  = 3;//上游企业
    int64       sumAmount       = 4;//应收账总额
    int64       startDate       = 5;//签订日期
    int64       endDate         = 6;//承兑日期
    Enterprise  issuedAgency    = 7;//发行机构
    ZsgjState   state           = 8;//状态
    string      info            = 9;//备注
    OperationType opty          = 10;//
    Enterprise  opCompany       = 11;//操作企业
    string      receiptId       = 12;//单据编号 //唯一ID
    Enterprise  investAgency    = 13;//基金方 渠道选择
    int64       rate            = 14;//逾期利率
    string      receiptViceId   = 15;//单据父ID
    int64       financeAmount   = 16;//已融资金额
}
//产品详情-
message ZsgjProduct{
    string productId            = 1;//产品编号 //唯一ID
    string productName          = 2;//产品名称
    int32  annualizedRate       = 4;//预期年化收益率
    Enterprise issuedAgency     = 5;//发行机构
    string frequency            = 6;//付息频率
    string payInterestMethod    = 7;//付息方式
    string calInterestMethod    = 8;//计息方式
    string coinType             = 9;//投资币种
    Enterprise guaranteeAgency  = 10;//担保机构
    Enterprise hostingAgency    = 11;//托管机构
    int64  issueScale           = 12;//发行规模
    string saleTarget           = 13;//销售对象
    string riskLevel            = 14;//风险级别
    int64  raiseStartDate       = 15;//募集开始时间
    int64  raiseEndDate         = 16;//募集结束时间
    int64  calInterestStart     = 17;//计息日开始
    int64  calInterestEnd       = 18;//计息日到期
    int64  startAmount          = 20;//认购起点金额
    int64  increamentingAmount  = 21;//认购递增金额
    int64  subscriptionPerson   = 22;//认购者上限
    bool   isTranferable        = 23;//是否可转让
    string info                 = 24;//备注
    int64  transferStart        = 25;//转让开始时间
    int64  transferEnd          = 26;//转让结束时间
    int64  minHoldingDuration           = 27;//最低持有时间
    bool   istransferRateFloat          = 28;//转让利率是否可浮动
    int64  minTransferAmount            = 29;//最低转让本金金额
    string rateFloatInterregional       = 30;//转让利率浮动区间
    int64  transferIncreamentingAmount  = 31;//转让递增本金金额
    string transferFeeTarget            = 32;//转让费收取对象
    ZsgjState state                     = 33;
    OperationType opty                  = 34;
    Enterprise opCompany                = 35;//操作企业
    string receiptId                    = 36;//单据ID
}
//账户
message ZsgjAccount{
    string           companyName      = 1;//企业名
    RmbAssets        rmb              = 2;//账户人民币余额
}
message ZsgjRoleAccount{
    Enterprise       enterprise       = 1;//企业名称-角色
    ReceiptAssets    receiptAssets    = 2;//单据资产
    ProductAssets    productAssets    = 3;//产品资产
    BlankNoteAssets  blankNoteAssets  = 4;//白条资产
    AdanceAssets     adanceAssets     = 5;//预付款资产
}
message AllAccount{
    ZsgjAccount account=1;
    repeated ZsgjRoleAccount roleAccount=2;
}
message ZsgjAction{
    oneof value{
        ZsgjSaveReceipt          zsgjSaveReceipt          = 1;//保存单据
        ZsgjSaveProduct          zsgjSaveProduct          = 2;//保存产品
        AssetRegisterAction      assetRegister            = 3;//资产登记
        ZsgjApplyRecharge        zsgjApplyRecharge        = 4;//充值
        ZsgjApplyWithdraw        zsgjApplyWithdraw        = 5;//提款
        ZsgjCash                 zsgjCash                 = 6;//兑付
        ZsgjClear                zsgjClear                = 7;//清算
        ZsgjDelist               zsgjDelist               = 8;//摘牌
        ZsgjCompanyCertification zsgjCompanyCertification = 9;//企业认证
        ZsgjPersonCertification  zsgjPersonCertification  = 10;//个人认证
        DlReceiptPay             dlReceiptPay             = 11;//单据支付
        DlReceiptDelist          dlReceiptDelist          = 12;//单据摘牌
        DlBlankNote              dlBlankNote              = 13;//白条
        DlReceiptList            dlReceiptList            = 14;//单据挂牌
        DlBlankNotePay           dlBlankNotePay           = 15;//白条支付
        DlReceiptAndNoteCash     dlReceiptAndNoteCash     = 16;//白条、单据持有兑付
        DlInvestCash             dlInvestCash             = 17;//渠道企业兑付
        DlCredit                 dlCredit                 = 18;//信用额度
        AdAssetRegister          adAssetRegister          = 19;//预付款资产登记
        AdApplyBlankNote         adApplyBlankNote         = 20;//预付款申请白条
        AdAndNoteCash            adAndNoteCash            = 21;//预付款申请兑付,白条兑付
        GylFinanceInfo           gylFinanceInfo           = 22;//供应链企业融资信息
        GylDirectFinance         gylDirectFinance         = 23;//供应链定向融资
    }
    int32 Ty = 50;
}
//兑付-
message ZsgjCash {
    string      id                  = 1;//序号 产品ID
    Enterprise  investAgency        = 2;//投资机构
    int64       rate                = 3;//兑付利率
    int64       waitAmount          = 4;//待付本金
    int64       waitInterest        = 5;//待付利息
    int64       delayWaitInterest   = 6;//延期待付利息
    int64       waitSumAmount       = 7;//待付总额
    OperationType opty              = 8;
    Enterprise  opCompany           = 9;
}
//清算-
message ZsgjClear{
    string      productId       = 1;//产品编号 //唯一ID
    string      name            = 2;//产品名称
    ZsgjState   state           = 4;//状态 认购中
    int64       annualizedRate  = 5;//年化利率
    Enterprise  issuedName      = 7;//发行商
    int64       createTime      = 8;//创建时间
    int64       amount          = 9;//发行总额
    int64       raiseStartDate  = 10;//募集开始时间
    int64       raiseEndDate    = 11;//募集结束时间
    int64       duration        = 12;//期限
}
//摘牌-
message ZsgjDelist{
    int64  calInterestStart         = 1;//计息日开始
    int64  calInterestEnd           = 2;//计息日到期
    int64  startAmount              = 3;//认购起点金额
    int64  increamentingAmount      = 4;//认购递增金额
    string saleTarget               = 5;//销售对象
    string riskLevel                = 6;//风险级别
    int32  annualizedRate           = 7;//预期年化收益率
    int64  duration                 = 8;//期限
    int64  purchaseable             = 9;//可购金额
    int64  purchase                 = 10;//购买金额
    OperationType opty              = 11;//
    Enterprise opCompany            = 12;
    string productId                = 13;
}
//提款
message ZsgjApplyWithdraw{
    string id                 = 1;//流水编号
    string companyName        = 2;//企业名称
    int64  applyDate          = 3;//申请时间
    int64  amount             = 4;//出金金额
    ZsgjState state           = 5;
    string name               = 6;//名称
    string account            = 7;//卡号
}
//充值
message ZsgjApplyRecharge{
    string id           = 1;//流水编号
    string companyName  = 2;//划拨企业
    int64  applyDate    = 3;//申请时间
    int64  amount       = 4;//入金金额
    string account      = 5;//银行卡号
    string name         = 6;//名称
    int64  completeDate = 7;//完成时间
}
//产品申请审核
message ZsgjProductExamine{
    ZsgjProduct product   = 1;
    int64       applyDate = 2;//申请时间
}
//个人认证
message ZsgjPersonCertification{
    string name             = 1;//认证姓名
    string idCard           = 2;//身份证号
    string phoneNumber      = 3;//注册手机号
    int64  certificateDate  = 4;//认证日期
    ZsgjState state         = 5;
    string info             = 6;//备注信息
}
//企业认证
message ZsgjCompanyCertification{
    string name             = 1;//认证姓名
    string idCard           = 2;//身份证号
    string phoneNumber      = 3;//注册手机号
    int64  certificateDate  = 4;//认证日期
    string info             = 5;//备注信息
    string companyName      = 6;//企业名称
    string companyAddress   = 7;//办公地址
    string licenseNumber    = 8;//营业执照号码
    string legalPersonName  = 9;//法人姓名
    ZsgjState state         = 10;
    bytes pubKey            = 11;//
}
//保存单据
message ZsgjSaveReceipt{
    ZsgjReceipt zsgjReceipt = 1;
}
//保存产品
message ZsgjSaveProduct{
    ZsgjProduct zsgjProduct = 1;
}
//资产登记-
message AssetRegisterAction{
    int64  registerDate         = 1;//登记时间
    Enterprise payCompany       = 2;//付款企业 核心企业
    Enterprise receiveCompany   = 3;//收款企业 上游企业
    int64  sumAmount            = 4;//应收账总额
    int64  startDate            = 5;//出账日期
    int64  endDate              = 6;//承兑日期
    string contractName         = 7;//合同名称 可以重复
    string contractNo           = 8;//合同编号 可以重复
    ZsgjState state             = 9;
    OperationType opty          = 10;//
    string receiptId            = 11;//单据ID
    Enterprise investAgency     = 12;//基金方 渠道选择
    int64  rate                 = 13;//逾期利率
}
//预付款资产登记-
message AdAssetRegister{
    int64  registerDate         = 1;//登记时间
    Enterprise coreCompany      = 2;//核心企业
    Enterprise downCompany      = 3;//下游企业
    int64  orderAmount          = 4;//订单总额
    int64  signDate             = 5;//签订日期
    int64  endDate              = 6;//承兑日期
    int64  goodsNums            = 7;//交货数量
    int64  goodsDate            = 8;//交货日期
    string goodsName            = 9;//商品名称
    ZsgjState state             = 10;
    OperationType opty          = 11;//
    string adanceId             = 12;//预付款ID
    int64  rate                 = 13;//利率
    Enterprise opCompany            = 14;//操作企业
}

//预付款申请白条
message AdApplyBlankNote{
    Enterprise coreCompany      = 1;//核心企业
    Enterprise financeCompany   = 2;//资金方企业
    bool isOnline               = 3;//付款方式
    bool isBank                 = 4;//资金方类型
    int64 amount                = 5;//白条金额
    int64 rate                  = 6;//利率
    int64 endDate               = 7;//白条承兑日期
    int64 cashAmount            = 8;//兑付金额
    string  blankId             = 9;//白条编号
    string  adanceId            = 10;//预付款编号
    ZsgjState state             = 11;
    OperationType opty          = 12;//
    Enterprise opCompany        = 13;//操作企业
}

//预付款兑付和白条兑付
message AdAndNoteCash{
    Enterprise ownerEnterprise  = 1;//持有方
    Enterprise cashEnterprise   = 2;//兑付方
    string adanceId             = 3;//预付款编号
    string blankNoteId          = 4;//预付款白条编号
    bool  isOverDue             = 5;//是否逾期
    int64 cashAmount            = 6;//
    ZsgjState state             = 9;
    OperationType opty          = 10;//
    Enterprise opCompany            = 11;//操作企业
}

//单据支付
message DlReceiptPay{
    Enterprise receiveCompany   = 1;//收款企业
    int64  amount               = 2;//订单金额
    int64  rate                 = 3;//年化利率
    int64  payAmount            = 4;//单据支付
    string info                 = 5;//附言
    Enterprise opCompany        = 6;//操作企业
    ZsgjState state             = 7;
    OperationType opty          = 8;//
    string receiptId            = 9;//
    string receiptParentsId     = 11;//
}
//单据摘牌
message DlReceiptDelist{
    int64 transferAmount        = 1;//转让份额
    int64 delistAmount          = 2;//摘取份额
    int64 rate                  = 3;//年化利率
    int64 discount              = 4;//贴现费
    int64 payAmount             = 5;//支付金额
    Enterprise opCompany        = 6;//操作企业
    Enterprise upstreamFirm     = 7;//上游企业
    ZsgjState state             = 8;
    OperationType opty          = 9;//
    string receiptId            = 10;//
    string receiptParentsId     = 11;//
}
//白条
message DlBlankNote{
    Enterprise  coreCompany     = 1;//核心企业
    Enterprise  upstreamFirm    = 2;//上游企业
    int64   amount              = 3;//单据总额
    Enterprise cashAgency       = 4;//承兑机构
    int64   completeDate        = 5;//票据到期日
    int64   cashDate            = 6;//白条承兑日期
    int64   applyBlankNote      = 7;//申请白条
    int64   blankNoteAmount     = 8;//白条价值
    int64   overdueRate         = 9;//逾期利率
    int64   leftAmount          = 10;//剩余资金
    Enterprise  opCompany       = 11;//操作企业
    ZsgjState   state           = 12;//状态
    OperationType opty          = 13;//
    string  blankNoteId         = 14;//白条id
    string  receiptId           = 15;//单据id
    string  receiptParentsId    = 16;//单据父id
    string  blankNoteParentsId  = 17;//白条父id

}
//单据挂牌
message DlReceiptList{
    int64   receiptAmount       = 1;//单据份额
    int64   transferAmount      = 2;//转让份额
    int64   rate                = 3;//贴现利率
    int64   discount            = 4;//当前贴现
    int64   finance             = 5;//融资金额
    string  listType            = 6;//挂牌类型
    Enterprise  opCompany       = 7;//操作企业
    ZsgjState state             = 8;
    OperationType opty          = 9;//
    string receiptId            = 10;//
    string receiptParentsId     = 11;//
    int64 listingAmount         = 12;//挂牌中的份额
}
//白条支付
message DlBlankNotePay{
    Enterprise receiveCompany   = 1;//收款企业
    int64  amount               = 2;//订单金额
    int64  rate                 = 3;//年化利率
    int64  payAmount            = 4;//白条支付
    string info                 = 5;//附言
    Enterprise opCompany        = 6;//操作企业
    ZsgjState state             = 7;
    OperationType opty          = 8;//
    string  blankNoteId         = 9;//白条id
    string  blankNoteParentsId  = 10;//白条父id
}
//渠道企业兑付(没用)
message DlInvestCash{
    string enterprise   = 1;//渠道企业
    int64  amount       = 2;//单据份额
    string receiptType  = 3;//单据类型
    string overdueStatus= 4;//逾期状况
    string cashStatus   = 5;//兑付类型
    int64  cashAmount   = 6;//兑付金额
    string opCompany    = 7;//操作企业
    ZsgjState state     = 8;
    OperationType opty  = 9;//
}
//白条、单据持有兑付
message DlReceiptAndNoteCash{
    Enterprise ownerEnterprise      = 1;//持有企业
    int64  amount                   = 2;//白条金额
    string cashType                 = 3;//兑付种类 单据、白条
    int64 overdueStatus             = 4;//逾期状况
    string cashStatus               = 5;//兑付类型 提前、逾期...
    int64  cashAmount               = 6;//兑付金额
    string cashTarget               = 7;//兑付对象 持有企业、渠道企业
    Enterprise opCompany            = 8;//操作企业
    int64  overdueRate              = 9;
    ZsgjState state                 = 10;
    OperationType opty              = 11;//
    string  blankNoteId             = 12;//白条id
    string  receiptId               = 13;//单据id
}
message DlCredit{
    Enterprise  coreCompany = 1;//核心企业
    int64   creditAmount    = 2;//信用额度
    int64   otherAmount     = 3;//其他渠道额度
    int64   using           = 4;//已使用
    int64   remaining       = 5;//剩余额度
    int64   oldAmount       = 6;//原额度
    ZsgjState state         = 7;//
    OperationType opty      = 8;
    Enterprise opCompany    = 9;
}

//申请融资
message GylFinanceInfo {
    Enterprise opCompany = 1;//申请企业
    repeated string partnerPic = 2;//伴侣身份证信息
    repeated string householdPic = 3;//户口信息
    repeated string taxPic = 4;//国地税信息
    repeated string marriagePic = 5;//结婚证信息
    repeated string contractPic = 6;//房产按揭合同信息
    repeated string articlePic = 7;//公司章程信息
    ZsgjState state         = 8;//
    OperationType opty      = 9;
}

//定向融资
message GylDirectFinance{
    int64   receiptAmount       = 1;//单据份额
    int64   transferAmount      = 2;//转让份额
    int64   rate                = 3;//贴现利率
    int64   discount            = 4;//当前贴现
    int64   finance             = 5;//融资金额
    Enterprise financeCompany   = 6;//资金方
    Enterprise upstreamCompany  = 7;//单据方
    Enterprise  opCompany       = 8;//操作企业
    ZsgjState state             = 9;
    OperationType opty          = 10;//
    string receiptId            = 11;//
    string receiptParentsId     = 12;//
}

message Enterprise{
    string name     =1;//企业名称
    string roleId   =2;//操作涉及企业角色
}
//产品摘牌信息
message DelistInfo{
    int64   amount  = 1;
    string  name    = 2;
}
message Delist{
    repeated DelistInfo info=1;
}
message RmbAssets{
    int64 rmb       = 1;
    int64 cashed    = 2;
    int64 waitCash  = 3;
    int64 invest    = 4;
    int64 income    = 5;
}
message ReceiptAssets{
    int64 receipt   = 1;
    int64 available = 2;
    int64 financing = 3;
    int64 payments  = 4;
}
message ProductAssets{
    int64 product   = 1;
    int64 available = 2;
    int64 financing = 3;
}
message BlankNoteAssets{
    int64 blankNote = 1;
    int64 available = 2;
    int64 payments  = 3;
}
message AdanceAssets{
    int64 receipt   = 1;
    int64 available = 2;
    int64 financing = 3;
    int64 payments  = 4;
}
message ZsgjReceiptInfo{
    string          receiptId       = 1;
    Enterprise      coreCompany     = 2;//核心企业
    Enterprise      receiveCompany  = 3;//上游企业
    int64           sumAmount       = 4;//应收账总额
    Enterprise      issuedAgency    = 5;//发行机构
    ZsgjState       state           = 6;//状态
    string          receiptViceId   = 7;//单据父ID
    int64           financeAmount   = 8;//已融资金额
    OperationType   opty            = 9;//
    Enterprise      investAgency    = 10;//基金方 渠道选择
    Enterprise          owner       = 11;//持有人
    int64           transferAmount  = 12;
    int64           payed           = 13;//已支付金额
}
message ZsgjProductInfo{
    string productId            = 1;//产品编号 //唯一ID
    string productName          = 2;//产品名称
    int32  annualizedRate       = 4;//预期年化收益率
    Enterprise issuedAgency     = 5;//发行机构
    string frequency            = 6;//付息频率
    string payInterestMethod    = 7;//付息方式
    string calInterestMethod    = 8;//计息方式
    string coinType             = 9;//投资币种
    Enterprise guaranteeAgency  = 10;//担保机构
    Enterprise hostingAgency    = 11;//托管机构
    int64  issueScale           = 12;//发行规模
    string saleTarget           = 13;//销售对象
    string riskLevel            = 14;//风险级别
    int64  raiseStartDate       = 15;//募集开始时间
    int64  raiseEndDate         = 16;//募集结束时间
    int64  calInterestStart     = 17;//计息日开始
    int64  calInterestEnd       = 18;//计息日到期
    int64  startAmount          = 20;//认购起点金额
    int64  increamentingAmount  = 21;//认购递增金额
    int64  subscriptionPerson   = 22;//认购者上限
    bool   isTranferable        = 23;//是否可转让
    string info                 = 24;//备注
    int64  transferStart        = 25;//转让开始时间
    int64  transferEnd          = 26;//转让结束时间
    int64  minHoldingDuration           = 27;//最低持有时间
    bool   istransferRateFloat          = 28;//转让利率是否可浮动
    int64  minTransferAmount            = 29;//最低转让本金金额
    string rateFloatInterregional       = 30;//转让利率浮动区间
    int64  transferIncreamentingAmount  = 31;//转让递增本金金额
    string transferFeeTarget            = 32;//转让费收取对象
    ZsgjState state                     = 33;
    OperationType opty                  = 34;
    Enterprise opCompany                = 35;//操作企业
    string receiptId                    = 36;//单据ID
    Enterprise owner                    = 37;
    int64  delisted                     = 38;//已摘牌额度
    int64  cashed                       = 39;//已兑付额度
}
message zsgjBlankNoteInfo{
    Enterprise  coreCompany     = 1;//核心企业
    Enterprise  upstreamFirm    = 2;//上游企业
    int64   amount              = 3;//单据总额
    Enterprise cashAgency       = 4;//承兑机构
    int64   completeDate        = 5;//票据到期日
    int64   cashDate            = 6;//白条承兑日期
